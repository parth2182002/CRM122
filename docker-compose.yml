version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maple_crm
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/maple_crm
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production}
      CLIENT_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:8080
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  db_data:
  uploads:
